<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعديل ملف الشركة - EduPlatform</title>

    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/theme.css">
    <link rel="stylesheet" href="assets/css/comp-profile.css">
</head>

<body>

<div id="navbar"></div>

<div class="container mt-5">

    <h2 class="mb-4 text-center">تعديل ملف الشركة</h2>

    <form id="editCompanyForm" enctype="multipart/form-data" class="edit-form">

        <!-- الاسم -->
        <div class="mb-3">
            <label class="form-label">اسم الشركة</label>
            <input type="text" id="companyName" class="form-control">
        </div>

        <!-- tagline -->
        <div class="mb-3">
            <label class="form-label">سطر تعريفي (Tagline)</label>
            <input type="text" id="companyTagline" class="form-control">
        </div>

        <!-- bio -->
        <div class="mb-3">
            <label class="form-label">نبذة عن الشركة</label>
            <textarea id="companyBio" class="form-control" rows="4"></textarea>
        </div>

        <!-- industry -->
        <div class="mb-3">
            <label class="form-label">مجال العمل</label>
            <input type="text" id="companyIndustry" class="form-control">
        </div>

        <!-- size -->
        <div class="mb-3">
            <label class="form-label">حجم الشركة</label>
            <input type="text" id="companySize" class="form-control">
        </div>

        <!-- phone -->
        <div class="mb-3">
            <label class="form-label">رقم الهاتف</label>
            <input type="text" id="companyPhone" class="form-control">
        </div>

        <!-- email -->
        <div class="mb-3">
            <label class="form-label">البريد الإلكتروني</label>
            <input type="email" id="companyEmail" class="form-control">
        </div>

        <!-- location -->
        <div class="mb-3">
            <label class="form-label">الموقع</label>
            <input type="text" id="companyLocation" class="form-control">
        </div>

        <!-- address -->
        <div class="mb-3">
            <label class="form-label">العنوان التفصيلي</label>
            <input type="text" id="companyAddress" class="form-control">
        </div>

        <!-- website -->
        <div class="mb-3">
            <label class="form-label">الموقع الإلكتروني</label>
            <input type="text" id="companyWebsite" class="form-control">
        </div>

        <!-- logo -->
        <div class="mb-3">
            <label class="form-label">شعار الشركة (Logo)</label>
            <input type="file" id="companyLogo" class="form-control">
        </div>

        <!-- certificate -->
        <div class="mb-3">
            <label class="form-label">شهادة الشركة</label>
            <input type="file" id="companyCertificate" class="form-control">
        </div>

        <!-- license -->
        <div class="mb-3">
            <label class="form-label">رخصة الشركة</label>
            <input type="file" id="companyLicense" class="form-control">
        </div>

        <button type="submit" class="btn btn-primary w-100 mt-3">حفظ التعديلات</button>

    </form>

</div>

<script src="assets/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/main.js"></script>
<script src="assets/js/company-edit.js"></script>

</body>
</html>
