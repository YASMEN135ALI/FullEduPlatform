<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملف الشركة - EduPlatform</title>

    
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
        <link rel="stylesheet" href="assets/css/profile.css">
        <link rel="stylesheet" href="assets/css/theme.css">
</head>

<body>

<div class="container py-5">

    <div class="card shadow-sm mb-4">
        <div class="card-body text-center">
            <img id="companyLogo" class="profile-img mb-3" src="assets/img/company.png" alt="Company Logo">

            <h3 id="companyName" class="fw-bold"></h3>
            <p id="companyIndustry" class="text-muted"></p>
            <p id="companyLocation"></p>
        </div>
    </div>

    <!-- Edit Company Profile -->
    <div class="card shadow-sm">
        <div class="card-body">
            <h4 class="fw-bold mb-3">تعديل بيانات الشركة</h4>

            <form id="editCompanyForm">

                <div class="mb-3">
                    <label class="form-label">اسم الشركة</label>
                    <input type="text" id="companyNameInput" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">مجال العمل</label>
                    <input type="text" id="industryInput" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">الموقع</label>
                    <input type="text" id="locationInput" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">رقم الهاتف</label>
                    <input type="text" id="phoneInput" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">الموقع الإلكتروني</label>
                    <input type="text" id="websiteInput" class="form-control">
                </div>

                <button type="submit" class="btn btn-primary w-100">حفظ التعديلات</button>
            </form>
        </div>
    </div>

</div>


  
     <script src="assets/js/bootstrap.bundle.min.js"></script>
     <script src="assets/js/bootstrap.min.js"></script>  
      
    <script src="assets/js/company-profile.js"></script>

</body>
</html>
