<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعديل الوظيفة - EduPlatform</title>

    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
        <link rel="stylesheet" href="assets/css/forms.css">
          <link rel="stylesheet" href="assets/css/theme.css">
</head>

<body>

    <div id="navbar"></div>

  
<div class="container py-5">

    <h2 class="fw-bold mb-4 text-center">تعديل الوظيفة</h2>

    <div class="card shadow-sm p-4">
        <form id="editJobForm">

            <div class="mb-3">
                <label class="form-label">عنوان الوظيفة</label>
                <input type="text" id="jobTitle" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">الوصف</label>
                <textarea id="jobDescription" class="form-control" rows="4" required></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">نوع الوظيفة</label>
                <select id="jobType" class="form-control">
                    <option value="full_time">دوام كامل</option>
                    <option value="part_time">دوام جزئي</option>
                    <option value="remote">عن بُعد</option>
                    <option value="hybrid">هجين</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">الراتب</label>
                <input type="text" id="jobSalary" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">المهارات المطلوبة</label>
                <input type="text" id="jobSkills" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">الموقع</label>
                <input type="text" id="jobLocation" class="form-control">
            </div>

            <button type="submit" class="btn btn-primary w-100">حفظ التعديلات</button>

        </form>
    </div>

</div>




    <div id="footer"></div>

  
     <script src="assets/js/bootstrap.bundle.min.js"></script>
     <script src="assets/js/bootstrap.min.js"></script>
         <scrip src="assets/js/main.js"></script>
    

    <script src="assets/js/company-edit-job.js"></script>

</body>
</html>
