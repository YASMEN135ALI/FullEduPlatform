<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/theme.css">
</head>
<body>
    <div class="container py-5">

    <h2 class="fw-bold mb-4 text-center">إعدادات الحساب</h2>

    <!-- تغيير كلمة المرور -->
    <div class="card p-4 shadow-sm mb-4">
        <h5 class="mb-3">تغيير كلمة المرور</h5>

        <form id="passwordForm">

            <div class="mb-3">
                <label class="form-label">كلمة المرور الحالية</label>
                <input type="password" id="oldPassword" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">كلمة المرور الجديدة</label>
                <input type="password" id="newPassword" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">تأكيد كلمة المرور</label>
                <input type="password" id="confirmPassword" class="form-control">
            </div>

            <button class="btn btn-primary w-100">تحديث كلمة المرور</button>

        </form>
    </div>

    <!-- إعدادات الإشعارات -->
    <div class="card p-4 shadow-sm">
        <h5 class="mb-3">إعدادات الإشعارات</h5>

        <form id="notificationsForm">

            <div class="form-check form-switch mb-3">
                <input class="form-check-input" type="checkbox" id="notifyApplicants">
                <label class="form-check-label">إشعار عند تقديم طالب جديد</label>
            </div>

            <div class="form-check form-switch mb-3">
                <input class="form-check-input" type="checkbox" id="notifyStatus">
                <label class="form-check-label">إشعار عند تغيير حالة متقدم</label>
            </div>

            <button class="btn btn-success w-100">حفظ الإعدادات</button>

        </form>
    </div>

</div>

<script src="assets/js/company-settings.js"></script>

</body>
</html>
