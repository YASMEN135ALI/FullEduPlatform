<script>
const input = document.getElementById("live-search-input");
const box = document.getElementById("live-search-results");

let timer = null;

input.addEventListener("input", function () {
    const q = this.value.trim();

    clearTimeout(timer);

    if (q.length < 2) {
        box.style.display = "none";
        return;
    }

    timer = setTimeout(async () => {
        const res = await fetch(`http://127.0.0.1:8000/api/search/live/?q=${encodeURIComponent(q)}`, {
            headers: {
                "Authorization": "Token " + localStorage.getItem("token")
            }
        });

        const data = await res.json();
        renderResults(data);
    }, 250);
});


function renderResults(data) {
    let html = "";

    if (data.courses?.length) {
        html += `<div class="px-2 py-1 text-primary fw-bold">📘 كورسات</div>`;
        data.courses.forEach(c => {
            html += `<div class="search-item" onclick="location.href='/course/${c.id}/'">${c.title}</div>`;
        });
    }

    if (data.teachers?.length) {
        html += `<div class="px-2 py-1 text-primary fw-bold">👨‍🏫 مدرسين</div>`;
        data.teachers.forEach(t => {
            html += `<div class="search-item" onclick="location.href='/teacher/${t.id}/'">${t.full_name}</div>`;
        });
    }

    if (data.companies?.length) {
        html += `<div class="px-2 py-1 text-primary fw-bold">🏢 شركات</div>`;
        data.companies.forEach(c => {
            html += `<div class="search-item" onclick="location.href='/company/${c.id}/'">${c.company_name}</div>`;
        });
    }

    if (data.jobs?.length) {
        html += `<div class="px-2 py-1 text-primary fw-bold">💼 وظائف</div>`;
        data.jobs.forEach(j => {
            html += `<div class="search-item" onclick="location.href='/job/${j.id}/'">${j.title}</div>`;
        });
    }

    box.innerHTML = html;
    box.style.display = "block";
}


document.addEventListener("click", function (e) {
    if (!input.contains(e.target) && !box.contains(e.target)) {
        box.style.display = "none";
    }
});
</script>
