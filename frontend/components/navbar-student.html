<script>
document.addEventListener("DOMContentLoaded", () => {

    async function loadNavbarNotifications() {

        const token = localStorage.getItem("token");
        if (!token) return;

        try {
            const response = await fetch("http://127.0.0.1:8000/api/accounts/notifications/student/", {
                method: "GET",
                headers: {
                    "Authorization": "Token " + token
                }
            });

            const data = await response.json();

            const notifList = document.getElementById("notif-list");
            const notifCount = document.getElementById("notif-count");

            notifList.innerHTML = "";

            // unread count
            const unread = data.filter(n => !n.is_read).length;

            if (unread > 0) {
                notifCount.style.display = "inline-block";
                notifCount.textContent = unread;
            } else {
                notifCount.style.display = "none";
            }

            // no notifications
            if (data.length === 0) {
                notifList.innerHTML = `<li class="text-center text-muted py-2">لا توجد إشعارات</li>`;
                return;
            }

            // show notifications
            data.slice(0, 5).forEach(n => {
                notifList.innerHTML += `
                    <li class="mb-1">
                        <a href="${n.link || 'student-notifications.html'}"
                           class="dropdown-item d-flex align-items-start">

                            <div class="me-2">
                                <i class="bi bi-${n.icon || 'bell'} fs-4 text-primary"></i>
                            </div>

                            <div>
                                <strong>${n.title}</strong>
                                <p class="small text-muted mb-0">${n.message}</p>
                            </div>

                        </a>
                    </li>
                    <li><hr class="dropdown-divider"></li>
                `;
            });

        } catch (error) {
            console.error("Error loading navbar notifications:", error);
        }
    }

    loadNavbarNotifications();
});
</script>
