<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة كورس جديد - EduPlatform</title>

    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/forms.css">
    <link rel="stylesheet" href="assets/css/theme.css">
</head>

<body>

    <div class="container mt-5">
        <h1 class="mb-4 text-center">إضافة كورس جديد</h1>

        <form id="courseForm" class="p-4 shadow rounded bg-white">

            <div class="mb-3">
                <label class="form-label">عنوان الكورس</label>
                <input type="text" id="title" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">الوصف</label>
                <textarea id="description" class="form-control" rows="4"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">السعر ($)</label>
                <input type="number" id="price" class="form-control" value="0" min="0">
            </div>

            <div class="mb-3">
                <label class="form-label">المستوى</label>
                <select id="level" class="form-select">
                    <option value="beginner">مبتدئ</option>
                    <option value="intermediate">متوسط</option>
                    <option value="advanced">متقدم</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">المدة (بالساعات)</label>
                <input type="number" id="duration" class="form-control" value="1" min="1">
            </div>

            <div class="mb-3">
                <label class="form-label">صورة الكورس</label>
                <input type="file" id="image" class="form-control" accept="image/*">
            </div>

            <button type="submit" class="btn btn-primary w-100">إضافة الكورس</button>
        </form>
    </div>

    <script src="assets/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/create-course.js"></script>

</body>

</html>
