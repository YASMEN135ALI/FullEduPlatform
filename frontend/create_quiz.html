<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إنشاء اختبار</title>
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
</head>

<body>

<div class="container mt-5">
    <h1 class="text-center mb-4">إنشاء اختبار جديد</h1>

    <form id="quizForm" class="p-4 shadow bg-white rounded">

        <div class="mb-3">
            <label class="form-label">عنوان الاختبار</label>
            <input type="text" id="quiz_title" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">درجة النجاح (%)</label>
            <input type="number" id="pass_score" class="form-control" value="60" min="1" max="100" required>
        </div>

        <div class="mb-3">
            <label class="form-label">عدد المحاولات</label>
            <input type="number" id="max_attempts" class="form-control" value="1" min="1" required>
        </div>

        <hr>

        <h4>الأسئلة</h4>
        <div id="questionsContainer"></div>

        <button type="button" id="addQuestionBtn" class="btn btn-secondary mt-3">+ إضافة سؤال</button>

        <button type="submit" class="btn btn-primary w-100 mt-4">حفظ الاختبار</button>

    </form>
</div>

<script src="assets/js/create-quiz.js"></script>
</body>
</html>
