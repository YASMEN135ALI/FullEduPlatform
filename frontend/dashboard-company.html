<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الشركة - EduPlatform</title>

    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/theme.css">
    <link rel="stylesheet" href="assets/css/dashboard.css">
</head>

<body>

    <!-- Navbar -->
    <div id="navbar"></div>

    <!-- Content -->
    <div class="content">

        <!-- Header -->
        <div class="header">
            <h4>مرحبًا، <span id="companyName">الشركة</span></h4>
            <span id="companyIndustry">الصناعة</span>
        </div>

        <!-- Stats -->
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="stats-card">
                    <h3 id="jobsCount">0</h3>
                    <p>عدد الوظائف المنشورة</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="stats-card">
                    <h3 id="applicantsCount">0</h3>
                    <p>عدد المتقدمين</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="stats-card">
                    <h3 id="acceptedCount">0</h3>
                    <p>عدد المقبولين</p>
                </div>
            </div>
        </div>

        <!-- ⭐ Filter Buttons -->
        <div class="filter-buttons mb-4">
            <button class="btn btn-secondary" data-status="all">عرض الكل</button>
            <button class="btn btn-primary" data-status="active">الوظائف النشطة</button>
            <button class="btn btn-warning" data-status="closed">الوظائف المغلقة</button>
            <button class="btn btn-dark" data-status="archived">الوظائف المؤرشفة</button>
        </div>

        <!-- Jobs Section -->
        <h4 class="mb-3">الوظائف المنشورة</h4>
        <div id="jobsList">
            <!-- سيتم تعبئتها من الجافاسكربت -->
        </div>

    </div>

    <!-- JS -->
    <script src="assets/js/company_dashboard.js"></script>
    <script src="assets/js/main.js"></script>

</body>
</html>
