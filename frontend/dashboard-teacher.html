<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة المدرّس - EduPlatform</title>

    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/theme.css">
    <link rel="stylesheet" href="assets/css/dashboard.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body>

<div id="navbar"></div>

<div class="content">

    <div class="header">
        <h4>مرحبًا، <span id="teacherName">المعلّم</span></h4>
        <span id="teacherSpecialization">التخصص</span>
    </div>

    <div class="row mb-4">
        <div class="col-md-4">
            <div class="stats-card">
                <h3 id="coursesCount">0</h3>
                <p>عدد الدورات</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="stats-card">
                <h3 id="studentsCount">0</h3>
                <p>عدد الطلاب</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="stats-card">
                <h3 id="viewsCount">0</h3>
                <p>عدد المشاهدات</p>
            </div>
        </div>
    </div>

    <h4 class="mb-3">دوراتي</h4>
    <div id="coursesList"></div>

</div>

<div id="footer"></div>

<script src="assets/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/main.js"></script>
<script src="assets/js/dashboard-teacher.js"></script>

</body>
</html>
