<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduPlatform - الرئيسية</title>

  <!-- Bootstrap -->
  <link rel="stylesheet" href="assets/css/bootstrap.min.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/theme.css">
</head>

<body>

  <!-- Navbar -->
  <div id="navbar"></div>

  <!-- Hero Section -->
  <section class="py-5 text-center bg-light">
    <div id="heroCarousel" class="carousel slide" data-bs-ride="carousel">
      <div class="carousel-inner">
        
        <!-- الصورة الأولى -->
        <div class="carousel-item active" data-bs-interval="5000">
          <img src="assets/images/hero_1.jpg" class="d-block w-100" alt="صورة 1">
          <div class="carousel-caption d-none d-md-block">
            <h2 class="fw-bold">تعلم واحصل على وظيفة</h2>
            <p>منصة للتعلم عبر الإنترنت وتطوير المهارات وفرص العمل</p>
            <a href="choose.html" class="btn btn-dark">ابدأ الآن</a>
          </div>
        </div>

        <!-- الصورة الثانية -->
        <div class="carousel-item" data-bs-interval="5000">
          <img src="assets/images/تعليم-الذكاء-الاصطناعي-للأطفال-1.jpg" class="d-block w-100" alt="صورة 2">
          <div class="carousel-caption d-none d-md-block">
            <h2 class="fw-bold">طوّر مهاراتك</h2>
            <p>انضم إلى آلاف المتعلمين حول العالم</p>
            <a href="courses.html" class="btn btn-dark">تصفح الكورسات</a>
          </div>
        </div>

        <!-- الصورة الثالثة -->
        <div class="carousel-item" data-bs-interval="5000">
          <img src="assets/images/cors.jpg" class="d-block w-100" alt="صورة 3">
          <div class="carousel-caption d-none d-md-block">
            <h2 class="fw-bold">فرص عمل حقيقية</h2>
            <p>اكتشف الوظائف المناسبة لك بعد التعلم</p>
            <a href="jobs.html" class="btn btn-dark">عرض الوظائف</a>
          </div>
        </div>
      </div>

      <!-- أزرار التنقل -->
      <button class="carousel-control-prev" type="button" data-bs-target="#heroCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
      </button>
      <button class="carousel-control-next" type="button" data-bs-target="#heroCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
      </button>
    </div>
  </section>
  <!-- Footer -->
  <div id="footer"></div>

  <!-- Bootstrap JS -->
  <script src="assets/js/bootstrap.bundle.min.js"></script>
  <!-- Custom JS -->
  <script src="assets/js/main.js"></script>
</body>
</html>
