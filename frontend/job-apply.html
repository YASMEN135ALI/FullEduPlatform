<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التقدّم على الوظيفة - EduPlatform</title>

    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/forms.css">
    <link rel="stylesheet" href="assets/css/theme.css">
</head>

<body>

    <div id="navbar"></div>

    <div class="login-container mt-5">
        <div class="login-box shadow">

            <h2 class="text-center mb-4 fw-bold">التقدّم على الوظيفة</h2>

            <p class="text-muted text-center mb-3" id="jobTitleText">
                الوظيفة: ...
            </p>

            <form id="applyForm">

                <div class="mb-3">
                    <label class="form-label">رسالة التقديم</label>
                    <textarea id="coverLetter" class="form-control" rows="4"
                        placeholder="اكتب نبذة قصيرة عنك ولماذا أنت مناسب لهذه الوظيفة" required></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">السيرة الذاتية (PDF فقط)</label>
                    <input type="file" id="cvFile" class="form-control" accept=".pdf" required>
                </div>

                <button type="submit" class="btn btn-success w-100 mt-3">إرسال الطلب</button>

                <div id="errorMsg" class="alert alert-danger text-center d-none mt-3"></div>
                <div id="successMsg" class="alert alert-success text-center d-none mt-3"></div>

            </form>
        </div>
    </div>

    <div id="footer"></div>

    <script src="assets/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/job-apply.js"></script>

</body>
</html>
