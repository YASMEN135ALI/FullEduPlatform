<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التوصيات - EduPlatform</title>

    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/theme.css">

    <style>
        body {
            background: #f8f9fa;
        }

        .page-container {
            padding: 30px 20px;
        }

        .section-card {
            background: #fff;
            padding: 25px;
            border-radius: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 35px;
        }

        .section-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #1e73be;
        }

        .badge-skill {
            background: #e3f2fd;
            color: #0d6efd;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 14px;
        }

        .badge-missing {
            background: #fdecea;
            color: #d9534f;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 14px;
        }

        .job-box {
            border: 1px solid #eee;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <div id="navbar"></div>

    <div class="container page-container">

        <h2 class="fw-bold mb-4">التوصيات الذكية للطالب</h2>

        <!-- Recommended Courses -->
        <div class="section-card">
            <h4 class="section-title">📘 كورسات مقترحة لك</h4>
            <ul id="recommendedCourses"></ul>
        </div>

        <!-- Career Path -->
        <div class="section-card">
            <h4 class="section-title">🎯 المسار الوظيفي المقترح</h4>
            <div id="careerPathBox"></div>
        </div>

        <!-- Missing Skills -->
        <div class="section-card">
            <h4 class="section-title">🧩 مهارات يجب تطويرها</h4>
            <div id="missingSkillsBox"></div>
        </div>

        <!-- Job Matching -->
        <div class="section-card">
            <h4 class="section-title">💼 وظائف مناسبة لك</h4>
            <div id="jobMatchingBox"></div>
        </div>

    </div>

    <div id="footer"></div>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/recommended.js"></script>

</body>
</html>
