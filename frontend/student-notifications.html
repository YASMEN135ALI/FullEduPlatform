<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إشعارات الطالب</title>

    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/theme.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">

    <style>
        body { background: #f7f8fa; }

        .notification-card {
            transition: 0.2s;
            border-right: 4px solid transparent;
        }

        .notification-card.unread {
            background: #eef5ff;
            border-right-color: #0d6efd;
        }

        .notification-card:hover {
            background: #f1f1f1;
        }

        .notif-icon {
            font-size: 1.8rem;
            color: #0d6efd;
        }
    </style>
</head>

<body>

<div class="container py-5">

    <h2 class="fw-bold mb-4 text-center">
        إشعارات الطالب
        <span class="badge bg-primary" id="notifCount">0</span>
    </h2>

    <button id="markAllRead" class="btn btn-outline-primary mb-3">
        تحديد الكل كمقروء
    </button>

    <div id="all-notifs"></div>

    <p id="noNotificationsMsg" class="text-center text-muted d-none mt-3">
        لا توجد إشعارات حالياً.
    </p>

</div>

<script src="assets/js/student-notifications.js"></script>

</body>
</html>
