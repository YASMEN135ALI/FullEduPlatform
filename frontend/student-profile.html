<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملف الطالب - EduPlatform</title>

    <link rel="stylesheet" href="assets/css/bootstrap.min.css">   
      <link rel="stylesheet" href="assets/css/theme.css">
       <link rel="stylesheet" href="assets/css/profile.css">
</head>

<body>

    
    <div class="container py-5">

        <div class="card shadow-sm mb-4">
            <div class="card-body text-center">

                <img id="studentAvatar" class="profile-img mb-3" src="assets/img/user.png" alt="Student">

                <h3 id="studentName" class="fw-bold"></h3>
                <p id="studentEmail" class="text-muted"></p>

                <span class="badge bg-primary" id="progressBadge"></span>

            </div>
        </div>

        <!-- Lessons Progress -->
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <h4 class="fw-bold mb-3">الدروس المكتملة</h4>

                <ul id="completedLessons" class="list-group list-group-flush"></ul>
            </div>
        </div>

        <!-- Certificates -->
        <div class="card shadow-sm">
            <div class="card-body">
                <h4 class="fw-bold mb-3">الشهادات</h4>

                <div id="certificatesContainer" class="row">
                    <!-- سيتم تحميل الشهادات هنا -->
                </div>
            </div>
        </div>

    </div>
    <!-- Edit Profile -->
<div class="card shadow-sm mb-4">
    <div class="card-body">
        <h4 class="fw-bold mb-3">تعديل المعلومات</h4>

        <form id="editStudentForm">

            <div class="mb-3">
                <label class="form-label">الاسم الكامل</label>
                <input type="text" id="fullNameInput" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">العمر</label>
                <input type="number" id="ageInput" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">المستوى التعليمي</label>
                <input type="text" id="educationInput" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">الدولة</label>
                <input type="text" id="countryInput" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">رقم الهاتف</label>
                <input type="text" id="phoneInput" class="form-control">
            </div>

            <button type="submit" class="btn btn-primary w-100">حفظ التعديلات</button>
        </form>
    </div>
</div>




     
     <script src="assets/js/bootstrap.bundle.min.js"></script>
     <script src="assets/js/bootstrap.min.js"></script>
   
    <script src="assets/js/student-profile.js"></script>

</body>
</html>
