<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>إشعارات المدرّس</title>

  <link rel="stylesheet" href="assets/css/bootstrap.min.css">

  <style>
    body {
      background: #eef1f5;
      font-family: "Tajawal", sans-serif;
    }

    .page-wrapper {
      max-width: 900px;
      margin: 30px auto;
    }

    .card-main {
      background: #fff;
      padding: 25px;
      border-radius: 14px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);
    }

    .notification-box {
      background: #f8f9fc;
      padding: 15px;
      border-radius: 12px;
      border: 1px solid #e3e6ee;
      margin-bottom: 12px;
    }

    .notification-time {
      font-size: 13px;
      color: #777;
    }

    .btn-clear {
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 13px;
    }
  </style>
</head>

<body>

<div class="page-wrapper">
  <div class="card-main">

    <div class="d-flex justify-content-between align-items-center mb-3">
      <h3>الإشعارات</h3>
      <button class="btn btn-outline-danger btn-clear" onclick="clearNotifications()">مسح الكل</button>
    </div>

    <div id="notificationsList"></div>

  </div>
</div>

<script src="assets/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/teacher-notifications.js"></script>

</body>
</html>
