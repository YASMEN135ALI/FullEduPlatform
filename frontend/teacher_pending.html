<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حسابك قيد المراجعة</title>
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">

    <style>
        body {
            background: #F1F5F9;
            font-family: 'Cairo', sans-serif;
        }

        .pending-container {
            max-width: 500px;
            margin: 80px auto;
            background: #fff;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
        }

        .pending-icon {
            font-size: 70px;
            color: #3B82F6;
            margin-bottom: 20px;
        }

        .pending-title {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #1E293B;
        }

        .pending-text {
            font-size: 16px;
            color: #64748B;
            margin-bottom: 25px;
        }

        .loader {
            width: 55px;
            height: 55px;
            border: 6px solid #E2E8F0;
            border-top-color: #3B82F6;
            border-radius: 50%;
            margin: 20px auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-main {
            background: #3B82F6;
            color: #fff;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: 600;
            text-decoration: none;
        }

        .btn-main:hover {
            background: #2563EB;
            color: #fff;
        }
    </style>
</head>

<body>

    <div class="pending-container">
        <div class="pending-icon">⏳</div>

        <h2 class="pending-title">حسابك قيد المراجعة</h2>

        <p class="pending-text">
            شكرًا لتسجيلك معنا!  
            فريق الإدارة يقوم الآن بمراجعة معلوماتك للتحقق من صحتها.  
            سيتم إشعارك فور قبول حسابك.
        </p>

        <div class="loader"></div>

        <a href="login.html" class="btn-main">العودة لتسجيل الدخول لاحقًا</a>
    </div>

</body>
</html>
