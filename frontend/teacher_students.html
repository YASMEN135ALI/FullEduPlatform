<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الطلاب</title>

    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/theme.css">
</head>

<body>
  <!-- Navbar -->
  <div id="navbar"></div>
<div class="container py-4">

    <h2 class="fw-bold mb-4">الطلاب المسجّلين</h2>

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>اسم الطالب</th>
                <th>البريد الإلكتروني</th>
                <th>الكورس</th>
                <th>تاريخ التسجيل</th>
                <th>خيارات</th>
            </tr>
        </thead>

        <tbody id="students-table">
            <!-- يتم تعبئته عبر JavaScript -->
        </tbody>
    </table>
</div>

<!-- مودال إرسال رسالة -->
<div class="modal fade" id="sendMessageModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">إرسال رسالة للطالب</div>
      <div class="modal-body">
        <textarea id="messageText" class="form-control"></textarea>
      </div>
      <div class="modal-footer">
        <button id="sendMessageBtn" class="btn btn-primary">إرسال</button>
      </div>
    </div>
  </div>
</div>

<!-- مودال عرض التقدّم -->
<div class="modal fade" id="progressModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">تقدّم الطالب</div>
      <div class="modal-body" id="progressContent">
        <!-- يتم تعبئته عبر JS -->
      </div>
    </div>
  </div>
</div>
<div id="footer"></div>

<script src="assets/js/teacher-students.js"></script>
<script src="assets/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/main.js"></script>

</body>
</html>
